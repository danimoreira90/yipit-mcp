services:
  db:
    image: postgres:16
    container_name: yipit_kpi_db
    environment:
      # Local dev creds (approved). Overridable via .env / environment — no real secret here (HR-6).
      POSTGRES_USER: ${POSTGRES_USER:-kpi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kpi}
      POSTGRES_DB: ${POSTGRES_DB:-kpi}
    ports:
      - "5432:5432"
    volumes:
      - kpi_pgdata:/var/lib/postgresql/data
      # Run once on first container init, in alphabetical order:
      #   01 — create the separate test database (kpi_test)
      #   02 — apply the schema to the dev database (kpi)
      - ./db/docker-init/01_create_test_db.sql:/docker-entrypoint-initdb.d/01_create_test_db.sql:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/02_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kpi} -d ${POSTGRES_DB:-kpi}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kpi_pgdata:
